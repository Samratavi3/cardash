
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Three.js WebGL - Flagship Honda City Showroom</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            color: #eeeeee;
            background: #030303;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #ffffff; }
        p { margin: 0 0 8px 0; font-size: 12px; color: #bbb; }
        .mode-tag { font-size: 11px; color: #00ffcc; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }

        #controls-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 10, 10, 0.92);
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .picker-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.5px;
        }

        .picker-group input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            transition: transform 0.2s;
        }

        .picker-group input[type="color"]:hover { transform: scale(1.1); }
        .picker-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .picker-group input[type="color"]::-webkit-color-swatch { border: 2px solid #ffffff; border-radius: 50%; }

        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #eee;
            padding: 9px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #00ffcc; color: #000; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.4); }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffffff;
            z-index: 200;
            background: rgba(3,3,3,0.98);
            padding: 20px 40px;
            border-radius: 8px;
            text-transform: uppercase;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        #container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Honda City Flagship Showroom</h1>
        <p>Click components directly to inspect hinges, slide tracks, window glass, folding mirrors, and custom lighting paths.</p>
        <span class="mode-tag">● Complete High-Fidelity Suite Online</span>
    </div>

    <div id="loading">Assembling Showroom Assets...</div>

    <div id="controls-overlay">
        <div class="picker-group">
            <input id="paint-picker" type="color" value="#53565A">
            <span>Paintwork</span>
        </div>
        <div class="picker-group">
            <input id="glass-picker" type="color" value="#121a24">
            <span>Cabin Tint</span>
        </div>
        <button class="btn" id="ignition-btn">Engine Ignition</button>
        <button class="btn" id="wiper-btn">Wiper Control</button>
        <button class="btn" id="reset-btn">Reset Vehicle</button>
    </div>

    <div id="container"></div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let camera, scene, renderer, controls, raycaster, mouse;
        
        // Premium Material References
        let bodyPaintMaterial, chromeDetailsMaterial, darkAlloyMaterial, brightAlloyMaterial;
        let windowGlassMaterial, lightingLensMaterial, interiorLeatherMaterial;
        let mechanicalBlackMat, mattePlasticsMat, screenDisplayMat, ambientLightMat, speakerMeshMat;
        let fogLightLensMat, connectingDRLMat;
        
        // Asset Mapping Registries
        const interactiveParts = {};
        const wheelMeshes = [];
        const frontWheels = [];
        const wiperMeshes = [];
        let steeringWheelMesh = null;
        let gearShifterMesh = null;
        let screenMesh = null;
        let deflectorMesh = null;
        let floorPuddleLight = null;
        
        // Intelligent Cornering Spotlight Outputs
        let fogLightLeftSpot = null;
        let fogLightRightSpot = null;

        const loadingEl = document.getElementById('loading');

        // Master Animation Kinematics Mapping Architecture
        const carStates = {
            // Hinged Closures & Panels
            door_fl:  { open: false, current: 0, target: 0, type: 'rotateY', max: 0.9, speed: 0.08 },
            door_fr:  { open: false, current: 0, target: 0, type: 'rotateY', max: -0.9, speed: 0.08 },
            door_rl:  { open: false, current: 0, target: 0, type: 'rotateY', max: 0.8, speed: 0.08 },
            door_rr:  { open: false, current: 0, target: 0, type: 'rotateY', max: -0.8, speed: 0.08 },
            bonnet:   { open: false, current: 0, target: 0, type: 'rotateX', max: -0.75, speed: 0.05 },
            boot:     { open: false, current: 0, target: 0, type: 'rotateX', max: 0.85, speed: 0.06 },
            
            // Electronic Folding Side Mirrors
            mirror_l: { open: false, current: 0, target: 0, type: 'rotateY', max: -1.2, speed: 0.09 },
            mirror_r: { open: false, current: 0, target: 0, type: 'rotateY', max: 1.2, speed: 0.09 },
            
            // Power Windows & Tipped Switch Triggers
            window_fl:{ open: false, current: 0, target: 0, type: 'translateY', max: -0.45, speed: 0.06 },
            window_fr:{ open: false, current: 0, target: 0, type: 'translateY', max: -0.45, speed: 0.06 },
            
            // Dynamic Seating Configuration Elements
            seat_f_l: { open: false, current: 0, target: 0, type: 'translateZ', max: -0.25, speed: 0.07 },
            seat_back:{ open: false, current: 0, target: 0, type: 'rotateX', max: 0.25, speed: 0.05 },
            
            // Multi-Axis Sliding Sunroof & Blind Liners
            sunroof:  { open: false, current: 0, target: 0, type: 'translateZ', max: -0.6, speed: 0.04 },
            shade:    { open: false, current: 0, target: 0, type: 'translateZ', max: -0.75, speed: 0.05 },
            
            // Cabin Storage Consoles
            glove_box:{ open: false, current: 0, target: 0, type: 'rotateX', max: 0.5, speed: 0.08 },
            armrest:  { open: false, current: 0, target: 0, type: 'rotateX', max: -1.0, speed: 0.08 },

            // Global System Operational States
            wipersActive: false,
            ignitionOn: false
        };

        init();

        function init() {
            const container = document.getElementById('container');

            // --- 1. Renderer Environment Pipeline ---
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x040404);
            scene.fog = new THREE.Fog(0x040404, 7, 18);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.position.set(5.5, 1.5, -5.5);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 * 0.96;
            controls.minDistance = 3.5;
            controls.maxDistance = 10;

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // --- 2. Advanced Global Illumination Array ---
            const mainOverheadLight = new THREE.DirectionalLight(0xffffff, 2.8);
            mainOverheadLight.position.set(4, 8, -2);
            mainOverheadLight.castShadow = true;
            mainOverheadLight.shadow.mapSize.set(2048, 2048);
            mainOverheadLight.shadow.bias = -0.0003;
            scene.add(mainOverheadLight);

            const studioRimLight = new THREE.DirectionalLight(0x90b0ff, 0.7);
            studioRimLight.position.set(-5, 3, 5);
            scene.add(studioRimLight);

            const floorGrid = new THREE.GridHelper(30, 60, 0x00ffcc, 0x121212);
            floorGrid.position.y = -0.002;
            floorGrid.material.opacity = 0.03;
            floorGrid.material.transparent = true;
            scene.add(floorGrid);

            const shadowFloorGeo = new THREE.PlaneGeometry(40, 40);
            const shadowFloorMat = new THREE.ShadowMaterial({ opacity: 0.65 });
            const shadowFloor = new THREE.Mesh(shadowFloorGeo, shadowFloorMat);
            shadowFloor.rotation.x = -Math.PI / 2;
            shadowFloor.receiveShadow = true;
            scene.add(shadowFloor);

            // Left Door Puddle Lamp System
            floorPuddleLight = new THREE.SpotLight(0x00ffcc, 0, 4, Math.PI / 5, 0.5, 1);
            floorPuddleLight.position.set(0.86, 0.7, 0.57);
            floorPuddleLight.target.position.set(1.6, 0, 0.57);
            scene.add(floorPuddleLight);
            scene.add(floorPuddleLight.target);

            // Smart Cornering Fog Light Beam Projections
            fogLightLeftSpot = new THREE.SpotLight(0xfffaed, 0, 6, Math.PI / 4, 0.4, 1);
            fogLightLeftSpot.position.set(0.75, 0.3, 1.9);
            fogLightLeftSpot.target.position.set(1.2, 0, 4.5);
            scene.add(fogLightLeftSpot); scene.add(fogLightLeftSpot.target);

            fogLightRightSpot = new THREE.SpotLight(0xfffaed, 0, 6, Math.PI / 4, 0.4, 1);
            fogLightRightSpot.position.set(-0.75, 0.3, 1.9);
            fogLightRightSpot.target.position.set(-1.2, 0, 4.5);
            scene.add(fogLightRightSpot); scene.add(fogLightRightSpot.target);

            // --- 3. Extract High Dynamic Range Reflections ---
            new RGBELoader()
                .setPath('https://threejs.org/examples/textures/equirectangular/')
                .load('venice_sunset_1k.hdr', function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.environment = texture;
                    loadHondaCityAsset();
                });

            // --- 4. Deep Material Engineering Definitions ---
            bodyPaintMaterial = new THREE.MeshPhysicalMaterial({ 
                color: 0x53565A, metalness: 0.95, roughness: 0.18, 
                clearcoat: 1.0, clearcoatRoughness: 0.01, sheen: 0.35, sheenRoughness: 0.1 
            });
            chromeDetailsMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.03 });
            darkAlloyMaterial = new THREE.MeshStandardMaterial({ color: 0x141414, metalness: 0.8, roughness: 0.38 });
            brightAlloyMaterial = new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.98, roughness: 0.08 });
            windowGlassMaterial = new THREE.MeshPhysicalMaterial({ color: 0x121a24, metalness: 0.1, roughness: 0.0, transmission: 0.88, transparent: true, ior: 1.52 });
            lightingLensMaterial = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.05, roughness: 0.02, transmission: 0.92, transparent: true });
            mechanicalBlackMat = new THREE.MeshStandardMaterial({ color: 0x0c0c0c, roughness: 0.85 });
            mattePlasticsMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.88, metalness: 0.0 });
            interiorLeatherMaterial = new THREE.MeshStandardMaterial({ color: 0xECE6D5, roughness: 0.65, sheen: 0.2 }); 
            speakerMeshMat = new THREE.MeshStandardMaterial({ color: 0x252525, metalness: 0.65, roughness: 0.45 });
            ambientLightMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1.0, emissive: 0x000000 });
            
            // Advanced Lighting Node Materials
            fogLightLensMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.1, emissive: 0x000000 });
            connectingDRLMat = new THREE.MeshStandardMaterial({ color: 0x330000, roughness: 0.2, emissive: 0x000000 });
            screenDisplayMat = new THREE.MeshBasicMaterial({ color: 0x111111 });

            setupInterfaceEvents();
            window.addEventListener('click', onSceneElementClick);
        }

        // --- 5. File Parser & Geometry Material Injection Loop ---
        function loadHondaCityAsset() {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            loader.load('honda_city.glb', function (gltf) {
                const carModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(carModel);
                carModel.position.y = -box.min.y;

                carModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true; child.receiveShadow = true;
                        const name = child.name.toLowerCase();

                        if (name.includes('body') || name.includes('panel')) child.material = bodyPaintMaterial;
                        else if (name.includes('chrome') || name.includes('badge') || name.includes('grille')) child.material = chromeDetailsMaterial;
                        else if (name.includes('glass') || name.includes('window')) child.material = windowGlassMaterial;
                        else if (name.includes('lens') || name.includes('headlight')) child.material = lightingLensMaterial;
                        else if (name.includes('fog_light_lens')) child.material = fogLightLensMat;
                        else if (name.includes('connecting_drl')) child.material = connectingDRLMat;
                        else if (name.includes('leather') || name.includes('seat')) child.material = interiorLeatherMaterial;
                        else if (name.includes('plastic') || name.includes('dash_pad')) child.material = mattePlasticsMat;
                        else if (name.includes('speaker')) child.material = speakerMeshMat;
                        else if (name.includes('ambient_line')) child.material = ambientLightMat;
                        else if (name.includes('wiper')) { child.material = mechanicalBlackMat; wiperMeshes.push(child); }
                        else if (name.includes('wheel') || name.includes('rim')) {
                            child.material = name.includes('face') ? brightAlloyMaterial : darkAlloyMaterial;
                            wheelMeshes.push(child);
                            if (name.includes('front')) frontWheels.push(child);
                        }

                        // Link data fields dynamically to custom tracks
                        for (const key in carStates) {
                            if (name.includes(key)) interactiveParts[key] = child;
                        }
                        
                        if (name.includes('steering_wheel')) steeringWheelMesh = child;
                        if (name.includes('gear_shifter')) gearShifterMesh = child;
                        if (name.includes('infotainment_screen')) screenMesh = child;
                        if (name.includes('sunroof_deflector')) deflectorMesh = child;
                    }
                });

                scene.add(carModel);
                hideLoadingScreen();

            }, undefined, function (error) {
                console.warn("Asset redirection triggered. Mounting procedural interactive chassis mockup.");
                generateParametricInteractiveVehicle();
            });
        }

        // --- 6. Parametric Assembly Factory (Hinges, Struts, and Components Setup) ---
        function generateParametricInteractiveVehicle() {
            const carGroup = new THREE.Group();

            // Underbody Chassis Core Foundation
            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.74, 0.45, 4.58), mechanicalBlackMat);
            frame.position.y = 0.33;
            carGroup.add(frame);

            // Specialized Front Apron Trim Housing the New LED Fog Assemblies
            const frontBumperGroup = new THREE.Group();
            frontBumperGroup.position.set(0, 0.45, 2.15);
            
            const fogLGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.02, 32); fogLGeo.rotateX(Math.PI/2);
            const fogLightLeftMesh = new THREE.Mesh(fogLGeo, fogLightLensMat);
            fogLightLeftMesh.position.set(0.72, -0.05, 0.1);
            frontBumperGroup.add(fogLightLeftMesh);
            interactiveParts['fog_light_l_mesh'] = fogLightLeftMesh; // Cache layout reference for glow maps

            const fogLightRightMesh = new THREE.Mesh(fogLGeo, fogLightLensMat);
            fogLightRightMesh.position.set(-0.72, -0.05, 0.1);
            frontBumperGroup.add(fogLightRightMesh);
            interactiveParts['fog_light_r_mesh'] = fogLightRightMesh;

            carGroup.add(frontBumperGroup);

            // Universal Node Structure Engine Instantiator
            function buildHingeNode(key, geometry, offset, material) {
                const pivotGroup = new THREE.Group();
                const primaryMesh = new THREE.Mesh(geometry, material);
                primaryMesh.castShadow = true; primaryMesh.receiveShadow = true;
                primaryMesh.position.copy(offset).negate();
                pivotGroup.add(primaryMesh);
                primaryMesh.name = `mesh_${key}`;
                interactiveParts[key] = pivotGroup;
                return pivotGroup;
            }

            // A. Structural Closures Array
            const doorGeo = new THREE.BoxGeometry(0.08, 0.85, 1.15);
            
            const doorFl = buildHingeNode('door_fl', doorGeo, new THREE.Vector3(0, 0, 0.57), bodyPaintMaterial);
            doorFl.position.set(0.87, 0.75, 0.57);
            carGroup.add(doorFl);

            const winFlPivot = buildHingeNode('window_fl', new THREE.BoxGeometry(0.02, 0.5, 1.05), new THREE.Vector3(0,0,0), windowGlassMaterial);
            winFlPivot.position.set(0, 0.4, 0);
            doorFl.children[0].add(winFlPivot);

            const spkMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.02, 32), speakerMeshMat);
            spkMesh.geometry.rotateZ(Math.PI/2);
            spkMesh.position.set(0.04, -0.25, 0.4);
            doorFl.children[0].add(spkMesh);

            const doorFr = buildHingeNode('door_fr', doorGeo, new THREE.Vector3(0, 0, 0.57), bodyPaintMaterial);
            doorFr.position.set(-0.87, 0.75, 0.57);
            carGroup.add(doorFr);

            const doorRl = buildHingeNode('door_rl', doorGeo, new THREE.Vector3(0, 0, 0.52), bodyPaintMaterial);
            doorRl.position.set(0.87, 0.75, -0.55);
            carGroup.add(doorRl);

            const doorRr = buildHingeNode('door_rr', doorGeo, new THREE.Vector3(0, 0, 0.52), bodyPaintMaterial);
            doorRr.position.set(-0.87, 0.75, -0.55);
            carGroup.add(doorRr);

            // B. Side View Folding Mirror Housing Configurations
            const mirrorGeo = new THREE.BoxGeometry(0.22, 0.12, 0.16);
            const mirrorL = buildHingeNode('mirror_l', mirrorGeo, new THREE.Vector3(0.11, 0, 0), bodyPaintMaterial);
            mirrorL.position.set(0.97, 0.95, 1.1);
            carGroup.add(mirrorL);

            const mirrorR = buildHingeNode('mirror_r', mirrorGeo, new THREE.Vector3(-0.11, 0, 0), bodyPaintMaterial);
            mirrorR.position.set(-0.97, 0.95, 1.1);
            carGroup.add(mirrorR);

            // C. Engine Bonnet Cover & Rear Boot System
            const bonnetPivot = buildHingeNode('bonnet', new THREE.BoxGeometry(1.65, 0.04, 1.25), new THREE.Vector3(0, 0, -0.62), bodyPaintMaterial);
            bonnetPivot.position.set(0, 0.82, 1.55);
            carGroup.add(bonnetPivot);

            const bootPivot = buildHingeNode('boot', new THREE.BoxGeometry(1.55, 0.35, 0.85), new THREE.Vector3(0, 0.15, 0.42), bodyPaintMaterial);
            bootPivot.position.set(0, 0.92, -1.85);
            carGroup.add(bootPivot);

            // Integrated Solid Connecting Rear Tail Lamp Lightbar
            const drlBarMesh = new THREE.Mesh(new THREE.BoxGeometry(1.53, 0.04, 0.02), connectingDRLMat);
            drlBarMesh.position.set(0, 0.14, 0.43);
            bootPivot.children[0].add(drlBarMesh);
            interactiveParts['connecting_drl_mesh'] = drlBarMesh;

            // D. Twin Panoramic Sunroof Tracking Layer
            const roofFrame = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.04, 2.5), bodyPaintMaterial);
            roofFrame.position.set(0, 1.4, -0.1);
            carGroup.add(roofFrame);

            const sunroofPivot = buildHingeNode('sunroof', new THREE.BoxGeometry(1.2, 0.02, 0.8), new THREE.Vector3(0,0,0), windowGlassMaterial);
            sunroofPivot.position.set(0, 1.42, 0.4);
            carGroup.add(sunroofPivot);

            deflectorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.05, 0.08), mechanicalBlackMat);
            deflectorMesh.position.set(0, 1.41, 0.82);
            carGroup.add(deflectorMesh);

            // E. Luxury Cabin Interior Components Mapping
            const cabinUpholsteryGroup = new THREE.Group();
            cabinUpholsteryGroup.position.set(0, 0.4, 0);

            // Front Left Comfort Seat Tracking System
            const seatBasePivot = buildHingeNode('seat_f_l', new THREE.BoxGeometry(0.6, 0.15, 0.6), new THREE.Vector3(0,0,0), interiorLeatherMaterial);
            seatBasePivot.position.set(0.4, 0.2, 0.2);
            
            const seatBackPivot = buildHingeNode('seat_back', new THREE.BoxGeometry(0.56, 0.7, 0.12), new THREE.Vector3(0, -0.35, 0), interiorLeatherMaterial);
            seatBackPivot.position.set(0, 0.5, -0.28);
            seatBasePivot.children[0].add(seatBackPivot);
            cabinUpholsteryGroup.add(seatBasePivot);

            // Drop-down Functional Glove Compartment
            const gloveBoxPivot = buildHingeNode('glove_box', new THREE.BoxGeometry(0.5, 0.25, 0.15), new THREE.Vector3(0, -0.12, -0.07), mechanicalBlackMat);
            gloveBoxPivot.position.set(-0.4, 0.45, 1.0);
            cabinUpholsteryGroup.add(gloveBoxPivot);

            // Primary Command Dashboard Assembly
            const dashMesh = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.5, 0.4), mattePlasticsMat);
            dashMesh.position.set(0, 0.65, 1.05);
            cabinUpholsteryGroup.add(dashMesh);

            screenMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.24, 0.16), screenDisplayMat);
            screenMesh.position.set(0, 0.7, 1.26);
            cabinUpholsteryGroup.add(screenMesh);

            const ambientLine = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.01, 0.01), ambientLightMat);
            ambientLine.position.set(0, 0.52, 1.26);
            cabinUpholsteryGroup.add(ambientLine);

            const steeringShaft = new THREE.Group();
            steeringShaft.position.set(0.4, 0.75, 1.1);
            steeringShaft.rotation.x = -0.35;
            
            steeringWheelMesh = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.02, 16, 64), mechanicalBlackMat);
            steeringShaft.add(steeringWheelMesh);
            cabinUpholsteryGroup.add(steeringShaft);

            // Rear Console AC Vents Core Assembly Structure
            const rearAcConsole = new THREE.Group();
            rearAcConsole.position.set(0, 0.35, -0.45); // Stationed at rear base of front armrest track boundary
            const acHousing = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.32, 0.18), mattePlasticsMat);
            rearAcConsole.add(acHousing);
            
            // Matte dual-louver directional slat markers
            const ventSlatL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.01), mechanicalBlackMat);
            ventSlatL.position.set(0.06, 0.06, 0.091);
            rearAcConsole.add(ventSlatL);
            const ventSlatR = ventSlatL.clone(); ventSlatR.position.x = -0.06;
            rearAcConsole.add(ventSlatR);
            cabinUpholsteryGroup.add(rearAcConsole);

            carGroup.add(cabinUpholsteryGroup);

            // F. Symmetric Alloys & Tire Clusters Mapping Loops
            const tireGeo = new THREE.CylinderGeometry(0.33, 0.33, 0.25, 32); tireGeo.rotateZ(Math.PI / 2);
            const positions = [[-0.84, 0.33, 1.4], [0.84, 0.33, 1.4], [-0.84, 0.33, -1.4], [0.84, 0.33, -1.4]];
            
            positions.forEach((pos, index) => {
                const rimGroup = new THREE.Group();
                rimGroup.position.set(pos[0], pos[1], pos[2]);
                
                const tire = new THREE.Mesh(tireGeo, darkAlloyMaterial);
                tire.castShadow = true; rimGroup.add(tire);
                
                // Overlay sharp diamond-cut bi-tone spoke lines
                const accent = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.55, 0.55), brightAlloyMaterial);
                tire.add(accent);

                wheelMeshes.push(tire);
                if (index < 2) frontWheels.push(rimGroup); // Register hubs for directional cornering checks
                carGroup.add(rimGroup);
            });

            scene.add(carGroup);
            hideLoadingScreen();
        }

        // --- 7. Precision Component Intersection System (Raycaster) ---
        function onSceneElementClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let nodeMesh = intersects[0].object;
                let stateKey = null;

                nodeMesh.traverseAncestors(ancestor => {
                    for (const key in carStates) {
                        if (ancestor.name.toLowerCase().includes(key) || nodeMesh.name.toLowerCase().includes(key)) {
                            stateKey = key;
                        }
                    }
                });

                if (!stateKey) {
                    for (const key in carStates) {
                        if (nodeMesh.name.includes(key)) stateKey = key;
                    }
                }

                if (stateKey && typeof carStates[stateKey] === 'object') {
                    const data = carStates[stateKey];
                    data.open = !data.open;
                    data.target = data.open ? data.max : 0;
                    
                    if (stateKey === 'door_fl') {
                        floorPuddleLight.intensity = data.open ? 6.0 : 0.0;
                    }
                }
            }
        }

        // --- 8. Real-time Showroom Kinematics Processing Loop ---
        function animate() {
            controls.update();

            const time = performance.now();

            // 1. Linearly Interpolate Structural Panel Rotations & Translations
            for (const key in carStates) {
                const data = carStates[key];
                const nodeGroup = interactiveParts[key];

                if (nodeGroup && data.type) {
                    data.current += (data.target - data.current) * data.speed;
                    
                    if (data.type === 'rotateY') nodeGroup.rotation.y = data.current;
                    if (data.type === 'rotateX') nodeGroup.rotation.x = data.current;
                    if (data.type === 'translateY') nodeGroup.position.y = data.current;
                    if (data.type === 'translateZ') nodeGroup.position.z = data.current;
                }
            }

            // 2. Dynamic Component Hardware Computations
            if (deflectorMesh && carStates['sunroof']) {
                const rOpenProgress = Math.abs(carStates['sunroof'].current) / 0.6;
                deflectorMesh.position.y = 1.41 + (Math.min(rOpenProgress, 1.0) * 0.05);
            }

            if (carStates.wipersActive) {
                const sweepAngle = Math.sin(time * 0.007) * 0.75 + 0.75;
                wiperMeshes.forEach(wiper => { wiper.rotation.y = sweepAngle; });
            } else {
                wiperMeshes.forEach(wiper => { wiper.rotation.y += (0 - wiper.rotation.y) * 0.1; });
            }

            // 3. Engine System & Cornering Lighting Intelligence Arrays
            if (carStates.ignitionOn) {
                // Initialize Cockpit Display Interfaces
                screenDisplayMat.color.setHex(0x00aaff);
                ambientLightMat.color.setHex(0x00ffcc);
                
                // Continuous steering wheel alignment sweep matrix calculations
                const steeringSweep = Math.sin(time * 0.0025) * 0.45;
                if (steeringWheelMesh) steeringWheelMesh.rotation.z = steeringSweep * 2.5;
                frontWheels.forEach(hub => { hub.rotation.y = steeringSweep; });

                // Intelligent Cornering Matrix: Increase fog beam intensity based on steering angle vectors
                fogLightLensMat.color.setHex(0xffffff);
                fogLightLensMat.emissive.setHex(0xfffaed);
                
                // Sweep left -> illuminate left fog light beam profile exponentially
                fogLightLeftSpot.intensity = steeringSweep > 0.05 ? 6.5 + (steeringSweep * 5.0) : 4.5;
                fogLightRightSpot.intensity = steeringSweep < -0.05 ? 6.5 + (Math.abs(steeringSweep) * 5.0) : 4.5;

                // Fire Outward-Flowing Tail DRL Sequence Animation Loop
                const pulsingGlow = (Math.sin(time * 0.005) * 0.3) + 0.7;
                connectingDRLMat.color.setHex(0xff0000);
                connectingDRLMat.emissive.setHex(0xcc0000);
                connectingDRLMat.emissiveIntensity = pulsingGlow;
            } else {
                // Return mechanical elements and display panels to safe standby states
                screenDisplayMat.color.setHex(0x111111);
                ambientLightMat.color.setHex(0x000000);
                fogLightLensMat.color.setHex(0x222222);
                fogLightLensMat.emissive.setHex(0x000000);
                connectingDRLMat.color.setHex(0x330000);
                connectingDRLMat.emissive.setHex(0x000000);

                fogLightLeftSpot.intensity = 0;
                fogLightRightSpot.intensity = 0;

                if (steeringWheelMesh) steeringWheelMesh.rotation.z += (0 - steeringWheelMesh.rotation.z) * 0.1;
                frontWheels.forEach(hub => { hub.rotation.y += (0 - hub.rotation.y) * 0.1; });
            }

            // Standby continuous rotation for multi-spoke wheel faces
            const wheelSpinVelocity = - time / 1000;
            wheelMeshes.forEach(mesh => { mesh.rotation.x = wheelSpinVelocity * Math.PI; });

            renderer.render(scene, camera);
        }

        // --- 9. Infrastructure UI Event Map Bindings ---
        function setupInterfaceEvents() {
            document.getElementById('paint-picker').addEventListener('input', function() {
                bodyPaintMaterial.color.set(this.value);
            });

            document.getElementById('glass-picker').addEventListener('input', function() {
                windowGlassMaterial.color.set(this.value);
            });

            document.getElementById('ignition-btn').addEventListener('click', function() {
                carStates.ignitionOn = !carStates.ignitionOn;
                this.style.background = carStates.ignitionOn ? '#00ffcc' : '#1a1a1a';
                this.style.color = carStates.ignitionOn ? '#000' : '#eee';
            });

            document.getElementById('wiper-btn').addEventListener('click', function() {
                carStates.wipersActive = !carStates.wipersActive;
                this.style.background = carStates.wipersActive ? '#00ffcc' : '#1a1a1a';
                this.style.color = carStates.wipersActive ? '#000' : '#eee';
            });

            document.getElementById('reset-btn').addEventListener('click', function() {
                for (const key in carStates) {
                    if (typeof carStates[key] === 'object') {
                        carStates[key].open = false;
                        carStates[key].target = 0;
                    }
                }
                carStates.wipersActive = false;
                carStates.ignitionOn = false;
                floorPuddleLight.intensity = 0;
                
                document.getElementById('wiper-btn').style.background = '#1a1a1a';
                document.getElementById('wiper-btn').style.color = '#eee';
                document.getElementById('ignition-btn').style.background = '#1a1a1a';
                document.getElementById('ignition-btn').style.color = '#eee';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function hideLoadingScreen() {
            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.remove(), 500);
        }
        
        window.addEventListener('resize', onWindowResize);
    </script>
</body>
