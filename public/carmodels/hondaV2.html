<!DOCTYPE html>
<html lang="en">
<head>
    <title>Three.js WebGL - Ultimate Honda City Replica Showroom</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            color: #eeeeee;
            background: #020202;
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 25px;
            box-sizing: border-box;
            text-align: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            pointer-events: none;
        }

        h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #ffffff; }
        p { margin: 0 0 8px 0; font-size: 12px; color: #bbb; }
        
        #cardekho-hud {
            display: inline-block;
            font-size: 11px;
            background: rgba(0, 255, 204, 0.15);
            color: #00ffcc;
            padding: 4px 14px;
            border-radius: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 204, 0.3);
            transition: all 0.3s ease;
        }

        #controls-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 10, 10, 0.94);
            padding: 15px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .picker-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 0.5px;
        }

        .picker-group input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            transition: transform 0.2s;
        }

        .picker-group input[type="color"]:hover { transform: scale(1.1); }
        .picker-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        .picker-group input[type="color"]::-webkit-color-swatch { border: 2px solid #ffffff; border-radius: 50%; }

        .btn {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #eee;
            padding: 9px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #00ffcc; color: #000; border-color: #00ffcc; box-shadow: 0 0 10px rgba(0,255,204,0.4); }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            letter-spacing: 3px;
            color: #ffffff;
            z-index: 200;
            background: rgba(3,3,3,0.98);
            padding: 20px 40px;
            border-radius: 8px;
            text-transform: uppercase;
            border: 1px solid #222;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        #container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Honda City Flagship 360° Showroom</h1>
        <p>Interactive Replica Architecture. Scroll or pinch to zoom directly past the glass into the cabin viewport.</p>
        <div id="cardekho-hud">Exterior 360° View</div>
    </div>

    <div id="loading">Compiling High-Fidelity Blueprint Architecture...</div>

    <div id="controls-overlay">
        <div class="picker-group">
            <input id="paint-picker" type="color" value="#53565A">
            <span>Metallic Paint</span>
        </div>
        <div class="picker-group">
            <input id="glass-picker" type="color" value="#121a24">
            <span>Acoustic Tint</span>
        </div>
        <button class="btn" id="ignition-btn">Engine Ignition</button>
        <button class="btn" id="wiper-btn">Wiper Control</button>
        <button class="btn" id="reset-btn">Reset Panels</button>
    </div>

    <div id="container"></div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

        let camera, scene, renderer, controls, raycaster, mouse;
        
        // Premium Material References
        let bodyPaintMaterial, chromeDetailsMaterial, darkAlloyMaterial, brightAlloyMaterial;
        let windowGlassMaterial, lightingLensMaterial, interiorLeatherMaterial;
        let mechanicalBlackMat, mattePlasticsMat, screenDisplayMat, ambientLightMat, speakerMeshMat;
        let fogLightLensMat, connectingDRLMat, engineAlloyMat, engineShroudMat, carbonDiffuserMat;
        
        // Asset Mapping Registries
        const interactiveParts = {};
        const wheelMeshes = [];
        const frontWheels = [];
        const wiperMeshes = [];
        let steeringWheelMesh = null;
        let gearShifterMesh = null;
        let screenMesh = null;
        let deflectorMesh = null;
        let floorPuddleLight = null;
        let gloveboxInteriorLight = null;
        
        // Intelligent Cornering Spotlight Outputs
        let fogLightLeftSpot = null;
        let fogLightRightSpot = null;

        const loadingEl = document.getElementById('loading');
        const hudEl = document.getElementById('cardekho-hud');

        // Master Animation Kinematics Mapping Architecture (5th-Gen Layout Synchronizations)
        const carStates = {
            // Outward-Opening Structural Hinge Formats
            door_fl:       { open: false, current: 0, target: 0, type: 'rotateY', max: 0.9, speed: 0.08 },
            door_fr:       { open: false, current: 0, target: 0, type: 'rotateY', max: -0.9, speed: 0.08 },
            door_rl:       { open: false, current: 0, target: 0, type: 'rotateY', max: 0.8, speed: 0.08 },
            door_rr:       { open: false, current: 0, target: 0, type: 'rotateY', max: -0.8, speed: 0.08 },
            bonnet:        { open: false, current: 0, target: 0, type: 'rotateX', max: -0.75, speed: 0.05 },
            boot:          { open: false, current: 0, target: 0, type: 'rotateX', max: 0.85, speed: 0.06 },
            
            // Re-mapped Outward ORVM Assemblies (Default open, fold inward)
            mirror_l:      { open: false, current: 0, target: 0, type: 'rotateY', max: 1.2, speed: 0.09 },
            mirror_r:      { open: false, current: 0, target: 0, type: 'rotateY', max: -1.2, speed: 0.09 },
            
            // Power Windows Linked to Tipping Switches
            window_fl:     { open: false, current: 0, target: 0, type: 'translateY', max: -0.45, speed: 0.06 },
            window_fr:     { open: false, current: 0, target: 0, type: 'translateY', max: -0.45, speed: 0.06 },
            window_rl:     { open: false, current: 0, target: 0, type: 'translateY', max: -0.42, speed: 0.06 },
            window_rr:     { open: false, current: 0, target: 0, type: 'translateY', max: -0.42, speed: 0.06 },
            
            // Driver & Passenger Sliding tracks
            seat_front_l:  { open: false, current: 0, target: 0, type: 'translateZ', max: -0.25, speed: 0.07 },
            seat_front_r:  { open: false, current: 0, target: 0, type: 'translateZ', max: -0.25, speed: 0.07 },
            seat_back_l:   { open: false, current: 0, target: 0, type: 'rotateX', max: 0.25, speed: 0.05 },
            seat_back_r:   { open: false, current: 0, target: 0, type: 'rotateX', max: 0.25, speed: 0.05 },
            
            // Rear Bench Luxury Drop Armrest
            rear_armrest:  { open: false, current: 0, target: 0, type: 'rotateX', max: 1.52, speed: 0.08 },
            
            // Cabin Storage Consoles
            glove_box:     { open: false, current: 0, target: 0, type: 'rotateX', max: 0.5, speed: 0.08 },
            armrest_front: { open: false, current: 0, target: 0, type: 'rotateX', max: -1.0, speed: 0.08 },
            gear_rod:      { open: false, current: 0, target: 0, type: 'translateZ', max: -0.12, speed: 0.09 },

            // Interactive Systems Hardware Flags
            wipersActive: false,
            ignitionOn: false
        };

        init();

        function init() {
            const container = document.getElementById('container');

            // --- 1. Renderer Processing Environment Pipeline ---
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020202);
            scene.fog = new THREE.Fog(0x020202, 6, 16);

            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 50);
            camera.position.set(5.5, 1.5, -5.5);

            // CarDekho Fluid Interaction Configuration Schema
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 * 0.96;
            controls.minDistance = 0.2;  // Allows passing completely inside cabin structures
            controls.maxDistance = 9.0;
            controls.target.set(0, 0.6, 0);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // --- 2. Advanced Dynamic Illumination Architecture ---
            const mainOverheadLight = new THREE.DirectionalLight(0xffffff, 2.8);
            mainOverheadLight.position.set(4, 8, -2);
            mainOverheadLight.castShadow = true;
            mainOverheadLight.shadow.mapSize.set(2048, 2048);
            mainOverheadLight.shadow.bias = -0.0002;
            scene.add(mainOverheadLight);

            const floorGrid = new THREE.GridHelper(30, 60, 0x00ffcc, 0x101010);
            floorGrid.position.y = -0.002;
            floorGrid.material.opacity = 0.02;
            floorGrid.material.transparent = true;
            scene.add(floorGrid);

            const shadowFloor = new THREE.Mesh(new THREE.PlaneGeometry(40, 40), new THREE.ShadowMaterial({ opacity: 0.65 }));
            shadowFloor.rotation.x = -Math.PI / 2;
            shadowFloor.receiveShadow = true;
            scene.add(shadowFloor);

            // Left Front Door Ground Projection Puddle Lamp
            floorPuddleLight = new THREE.SpotLight(0x00ffcc, 0, 4, Math.PI / 5, 0.5, 1);
            floorPuddleLight.position.set(0.87, 0.7, 0.57);
            floorPuddleLight.target.position.set(1.6, 0, 0.57);
            scene.add(floorPuddleLight); scene.add(floorPuddleLight.target);

            // Deep Glovebox Utility Light Source
            gloveboxInteriorLight = new THREE.PointLight(0xffe6aa, 0, 1.2, 1.5);
            gloveboxInteriorLight.position.set(-0.4, 0.45, 1.0);
            scene.add(gloveboxInteriorLight);

            // Active Cornering Fog Light Systems
            fogLightLeftSpot = new THREE.SpotLight(0xfffaed, 0, 6, Math.PI / 4, 0.4, 1);
            fogLightLeftSpot.position.set(0.72, 0.3, 2.2);
            fogLightLeftSpot.target.position.set(1.2, 0, 4.5);
            scene.add(fogLightLeftSpot); scene.add(fogLightLeftSpot.target);

            fogLightRightSpot = new THREE.SpotLight(0xfffaed, 0, 6, Math.PI / 4, 0.4, 1);
            fogLightRightSpot.position.set(-0.72, 0.3, 2.2);
            fogLightRightSpot.target.position.set(-1.2, 0, 4.5);
            scene.add(fogLightRightSpot); scene.add(fogLightRightSpot.target);

            // --- 3. HDR Reflection Extraction Setup ---
            new RGBELoader()
                .setPath('https://threejs.org/examples/textures/equirectangular/')
                .load('venice_sunset_1k.hdr', function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.environment = texture;
                    loadHondaCityAsset();
                });

            // --- 4. Micro-Material Texture Layer Engineering ---
            bodyPaintMaterial = new THREE.MeshPhysicalMaterial({ 
                color: 0x53565A, metalness: 0.95, roughness: 0.16, 
                clearcoat: 1.0, clearcoatRoughness: 0.01, sheen: 0.3, sheenRoughness: 0.1 
            });
            chromeDetailsMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.02 });
            darkAlloyMaterial = new THREE.MeshStandardMaterial({ color: 0x121212, metalness: 0.8, roughness: 0.4 });
            brightAlloyMaterial = new THREE.MeshStandardMaterial({ color: 0xe5e5e5, metalness: 1.0, roughness: 0.06 });
            windowGlassMaterial = new THREE.MeshPhysicalMaterial({ color: 0x121a24, metalness: 0.1, roughness: 0.0, transmission: 0.88, transparent: true, ior: 1.52 });
            lightingLensMaterial = new THREE.MeshPhysicalMaterial({ color: 0xffffff, metalness: 0.05, roughness: 0.02, transmission: 0.92, transparent: true });
            mechanicalBlackMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.85 });
            
            // Dual-Tone Cabin Architecture Mapping Profiles
            mattePlasticsMat = new THREE.MeshStandardMaterial({ color: 0x161616, roughness: 0.85, metalness: 0.0 }); // Anti-Reflective Upper Dashboard Top
            interiorLeatherMaterial = new THREE.MeshStandardMaterial({ color: 0xECE6D5, roughness: 0.62, sheen: 0.25 }); // Premium Soft Ivory
            
            // Replica Hardware Accents
            speakerMeshMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.5 });
            carbonDiffuserMat = new THREE.MeshStandardMaterial({ color: 0x1c1c1c, roughness: 0.75, metalness: 0.1 });
            engineAlloyMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.35 });
            engineShroudMat = new THREE.MeshStandardMaterial({ color: 0x1f1f1f, roughness: 0.7, metalness: 0.1 });
            
            // System Emitters
            ambientLightMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1.0, emissive: 0x000000 });
            fogLightLensMat = new THREE.MeshStandardMaterial({ color: 0x202020, roughness: 0.1, emissive: 0x000000 });
            connectingDRLMat = new THREE.MeshStandardMaterial({ color: 0x220000, roughness: 0.2, emissive: 0x000000 });
            screenDisplayMat = new THREE.MeshBasicMaterial({ color: 0x101010 });

            setupInterfaceEvents();
            window.addEventListener('click', onSceneElementClick);
        }

        // --- 5. Asset Fallback Parser Node Map ---
        function loadHondaCityAsset() {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            // Execution path intercepts pre-compiled files natively if hosted locally
            loader.load('honda_city.glb', function (gltf) {
                const carModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(carModel);
                carModel.position.y = -box.min.y;

                carModel.traverse(function (child) {
                    if (child.isMesh) {
                        child.castShadow = true; child.receiveShadow = true;
                        const name = child.name.toLowerCase();

                        if (name.includes('body') || name.includes('panel')) child.material = bodyPaintMaterial;
                        else if (name.includes('chrome') || name.includes('badge')) child.material = chromeDetailsMaterial;
                        else if (name.includes('glass') || name.includes('window')) child.material = windowGlassMaterial;
                        else if (name.includes('lens') || name.includes('headlight')) child.material = lightingLensMaterial;
                        else if (name.includes('fog_light')) child.material = fogLightLensMat;
                        else if (name.includes('connecting_drl')) child.material = connectingDRLMat;
                        else if (name.includes('leather') || name.includes('seat')) child.material = interiorLeatherMaterial;
                        else if (name.includes('plastic') || name.includes('dash_pad')) child.material = mattePlasticsMat;
                        else if (name.includes('speaker')) child.material = speakerMeshMat;
                        else if (name.includes('engine')) child.material = engineShroudMat;
                        else if (name.includes('wiper')) { child.material = mechanicalBlackMat; wiperMeshes.push(child); }
                        else if (name.includes('wheel') || name.includes('rim')) {
                            child.material = name.includes('face') ? brightAlloyMaterial : darkAlloyMaterial;
                            wheelMeshes.push(child);
                            if (name.includes('front')) frontWheels.push(child);
                        }

                        for (const key in carStates) {
                            if (name.includes(key)) interactiveParts[key] = child;
                        }
                        
                        if (name.includes('steering_wheel')) steeringWheelMesh = child;
                        if (name.includes('gear_shifter')) gearShifterMesh = child;
                        if (name.includes('infotainment_screen')) screenMesh = child;
                        if (name.includes('sunroof_deflector')) deflectorMesh = child;
                    }
                });

                scene.add(carModel);
                hideLoadingScreen();

            }, undefined, function (error) {
                console.warn("Generating high-fidelity 1:1 parametric chassis representation.");
                generate1to1ParametricReplica();
            });
        }

        // --- 6. 1:1 Scaled Parametric Replica Generation (Exact 5th-Gen Specifications) ---
        function generate1to1ParametricReplica() {
            const carGroup = new THREE.Group();

            // Strict Chassis Bounding Dimensions Layer (4.58m length x 1.75m width x 1.49m height)
            const structuralFrame = new THREE.Mesh(new THREE.BoxGeometry(1.74, 0.35, 4.58), mechanicalBlackMat);
            structuralFrame.position.y = 0.28;
            carGroup.add(structuralFrame);

            // Helper Utility for Isolated Node-Link Hinge Conversions
            function buildHingeNode(key, geometry, offset, material) {
                const pivotGroup = new THREE.Group();
                const primaryMesh = new THREE.Mesh(geometry, material);
                primaryMesh.castShadow = true; primaryMesh.receiveShadow = true;
                primaryMesh.position.copy(offset).negate();
                pivotGroup.add(primaryMesh);
                primaryMesh.name = `mesh_${key}`;
                interactiveParts[key] = pivotGroup;
                return pivotGroup;
            }

            // A. Precise 4-Door Structural Matrix (Outward Vector Layouts)
            const doorGeo = new THREE.BoxGeometry(0.06, 0.82, 1.12);
            
            // Left Front (Swings outward on positive Y arc)
            const doorFl = buildHingeNode('door_fl', doorGeo, new THREE.Vector3(0, 0, 0.56), bodyPaintMaterial);
            doorFl.position.set(0.87, 0.72, 0.56);
            carGroup.add(doorFl);

            const winFl = buildHingeNode('window_fl', new THREE.BoxGeometry(0.015, 0.48, 1.02), new THREE.Vector3(0,0,0), windowGlassMaterial);
            winFl.position.set(0, 0.38, 0);
            doorFl.children[0].add(winFl);

            // Master Driver Door 4-Way Power Window Tipping Switch Box console
            const swDeck = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.18), mattePlasticsMat);
            swDeck.position.set(0.04, 0.02, 0.25);
            doorFl.children[0].add(swDeck);
            
            const microToggle = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.012, 0.015), mechanicalBlackMat);
            microToggle.position.set(0.045, 0.04, 0.22);
            doorFl.children[0].add(microToggle);
            interactiveParts['driver_switch_fl'] = microToggle; // Link tracking trigger hook

            const spkMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.02, 32), speakerMeshMat);
            spkMesh.geometry.rotateZ(Math.PI/2); spkMesh.position.set(0.03, -0.22, 0.38);
            doorFl.children[0].add(spkMesh);

            // Right Front (Swings outward symmetrically on negative Y arc)
            const doorFr = buildHingeNode('door_fr', doorGeo, new THREE.Vector3(0, 0, 0.56), bodyPaintMaterial);
            doorFr.position.set(-0.87, 0.72, 0.56);
            carGroup.add(doorFr);

            const winFr = buildHingeNode('window_fr', new THREE.BoxGeometry(0.015, 0.48, 1.02), new THREE.Vector3(0,0,0), windowGlassMaterial);
            winFr.position.set(0, 0.38, 0); doorFr.children[0].add(winFr);

            // Rear Passengers Access Panels Configuration
            const doorRl = buildHingeNode('door_rl', doorGeo, new THREE.Vector3(0, 0, 0.5), bodyPaintMaterial);
            doorRl.position.set(0.87, 0.72, -0.56);
            carGroup.add(doorRl);

            const winRl = buildHingeNode('window_rl', new THREE.BoxGeometry(0.015, 0.45, 0.96), new THREE.Vector3(0,0,0), windowGlassMaterial);
            winRl.position.set(0, 0.36, 0); doorRl.children[0].add(winRl);

            const doorRr = buildHingeNode('door_rr', doorGeo, new THREE.Vector3(0, 0, 0.5), bodyPaintMaterial);
            doorRr.position.set(-0.87, 0.72, -0.56);
            carGroup.add(doorRr);

            const winRr = buildHingeNode('window_rr', new THREE.BoxGeometry(0.015, 0.45, 0.96), new THREE.Vector3(0,0,0), windowGlassMaterial);
            winRr.position.set(0, 0.36, 0); doorRr.children[0].add(winRr);

            // B. Re-mapped ORVM Electronic Mirrors (Default open, swing inwards)
            const mirrorGeo = new THREE.BoxGeometry(0.2, 0.11, 0.14);
            const mirrorL = buildHingeNode('mirror_l', mirrorGeo, new THREE.Vector3(0.1, 0, 0), bodyPaintMaterial);
            mirrorL.position.set(0.97, 0.92, 1.08);
            carGroup.add(mirrorL);

            const mirrorR = buildHingeNode('mirror_r', mirrorGeo, new THREE.Vector3(-0.1, 0, 0), bodyPaintMaterial);
            mirrorR.position.set(-0.97, 0.92, 1.08);
            carGroup.add(mirrorR);

            // C. 1.5L i-VTEC DOHC Engine Bay Module (Under Bonnet)
            const bonnetPivot = buildHingeNode('bonnet', new THREE.BoxGeometry(1.62, 0.03, 1.2), new THREE.Vector3(0, 0, -0.6), bodyPaintMaterial);
            bonnetPivot.position.set(0, 0.82, 1.52);
            carGroup.add(bonnetPivot);

            const engineBayCavity = new THREE.Group();
            engineBayCavity.position.set(0, 0.45, 1.52);
            const blockBase = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.35, 0.55), engineAlloyMat);
            engineBayCavity.add(blockBase);
            
            const valveCover = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.1, 0.4), engineShroudMat);
            valveCover.position.y = 0.22;
            engineBayCavity.add(valveCover);
            
            const iVtecBadge = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.01, 0.08), chromeDetailsMaterial);
            iVtecBadge.position.set(0, 0.27, 0);
            engineBayCavity.add(iVtecBadge);
            carGroup.add(engineBayCavity);

            // D. Fully Hollowed-out 506-Liter Rear Cargo Trunk Compartment
            const bootPivot = buildHingeNode('boot', new THREE.BoxGeometry(1.52, 0.32, 0.82), new THREE.Vector3(0, 0.12, 0.41), bodyPaintMaterial);
            bootPivot.position.set(0, 0.92, -1.82);
            carGroup.add(bootPivot);

            const drlBarMesh = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.03, 0.01), connectingDRLMat);
            drlBarMesh.position.set(0, 0.12, 0.42);
            bootPivot.children[0].add(drlBarMesh);
            interactiveParts['connecting_drl_mesh'] = drlBarMesh;

            // Deep Hollow Cargo Tub Insertion Layer
            const trunkInteriorCavity = new THREE.Mesh(new THREE.BoxGeometry(1.35, 0.42, 0.85), mechanicalBlackMat);
            trunkInteriorCavity.position.set(0, 0.38, -1.55);
            carGroup.add(trunkInteriorCavity);

            // Lower Sporty Carbon-Texture Rear Bumper Apron Frame
            const rearDiffuser = new THREE.Mesh(new THREE.BoxGeometry(1.65, 0.22, 0.3), carbonDiffuserMat);
            rearDiffuser.position.set(0, 0.22, -2.1);
            carGroup.add(rearDiffuser);

            // E. Aerodynamic Shark-Fin Roof Antenna Trim
            const sharkFin = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.12, 4), bodyPaintMaterial);
            sharkFin.rotation.x = -0.5; sharkFin.position.set(0, 1.44, -1.1);
            carGroup.add(sharkFin);

            // F. Panoramic Roof Retraction Rails
            const sunroofPivot = buildHingeNode('sunroof', new THREE.BoxGeometry(1.15, 0.015, 0.78), new THREE.Vector3(0,0,0), windowGlassMaterial);
            sunroofPivot.position.set(0, 1.42, 0.35);
            carGroup.add(sunroofPivot);

            deflectorMesh = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.04, 0.06), mechanicalBlackMat);
            deflectorMesh.position.set(0, 1.41, 0.76);
            carGroup.add(deflectorMesh);

            // G. Flagship Dual-Tone 5-Passenger Seating Configuration (Sunroof Bound Clearances)
            const interiorTubGroup = new THREE.Group();
            interiorTubGroup.position.set(0, 0.36, 0);

            // Front Row Dual Bucket Setup (Lowered profiles to preserve headroom)
            const buildFrontSeat = (sideKey, posX) => {
                const basePivot = buildHingeNode(`seat_front_${sideKey}`, new THREE.BoxGeometry(0.56, 0.12, 0.56), new THREE.Vector3(0,0,0), interiorLeatherMaterial);
                basePivot.position.set(posX, 0.18, 0.25);
                
                const backPivot = buildHingeNode(`seat_back_${sideKey}`, new THREE.BoxGeometry(0.52, 0.65, 0.1), new THREE.Vector3(0, -0.32, 0), interiorLeatherMaterial);
                backPivot.position.set(0, 0.44, -0.26);
                
                const frontHeadrest = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.16, 0.1), interiorLeatherMaterial);
                frontHeadrest.position.y = 0.38;
                backPivot.children[0].add(frontHeadrest);
                
                basePivot.children[0].add(backPivot);
                return basePivot;
            };
            interiorTubGroup.add(buildFrontSeat('l', 0.38));
            interiorTubGroup.add(buildFrontSeat('r', -0.38));

            // Rear Row 3-Passenger Bench + Drop-down Center Armrest
            const rearBenchMesh = new THREE.Mesh(new THREE.BoxGeometry(1.42, 0.22, 0.62), interiorLeatherMaterial);
            rearBenchMesh.position.set(0, 0.24, -0.75);
            
            const rearBackrestGeo = new THREE.BoxGeometry(1.4, 0.62, 0.12);
            const rearBackrest = new THREE.Mesh(rearBackrestGeo, interiorLeatherMaterial);
            rearBackrest.position.set(0, 0.58, -1.02);
            
            // Triple Distinct Tailored Headrests
            for(let i = -1; i <= 1; i++) {
                const rearHeadrest = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.15, 0.08), interiorLeatherMaterial);
                rearHeadrest.position.set(i * 0.42, 0.36, 0);
                rearBackrest.add(rearHeadrest);
            }
            
            // Functional Rear Drop-down Center Armrest panel
            const rearArmrestPivot = buildHingeNode('rear_armrest', new THREE.BoxGeometry(0.28, 0.38, 0.1), new THREE.Vector3(0, -0.19, 0.05), interiorLeatherMaterial);
            rearArmrestPivot.position.set(0, 0.58, -0.96);
            
            const cupholderMold = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.01, 16), mechanicalBlackMat);
            cupholderMold.position.set(0, 0.12, 0.04); cupholderMold.rotation.x = Math.PI/2;
            rearArmrestPivot.children[0].add(cupholderMold);
            
            carGroup.add(rearArmrestPivot);
            carGroup.add(rearBenchMesh); carGroup.add(rearBackrest);

            // H. Wave-Key Driver Dashboard Console Layout
            const upperDashTop = new THREE.Mesh(new THREE.BoxGeometry(1.58, 0.45, 0.35), mattePlasticsMat);
            upperDashTop.position.set(0, 0.66, 1.05); interiorTubGroup.add(upperDashTop);

            const ivoryLowerTrim = new THREE.Mesh(new THREE.BoxGeometry(1.56, 0.2, 0.05), interiorLeatherMaterial);
            ivoryLowerTrim.position.set(0, 0.5, 1.21); interiorTubGroup.add(ivoryLowerTrim);

            const gloveBoxPivot = buildHingeNode('glove_box', new THREE.BoxGeometry(0.48, 0.22, 0.14), new THREE.Vector3(0, -0.11, -0.06), mechanicalBlackMat);
            gloveBoxPivot.position.set(-0.4, 0.44, 1.18); interiorTubGroup.add(gloveBoxPivot);

            screenMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.15), screenDisplayMat);
            screenMesh.position.set(0, 0.56, 1.24); interiorTubGroup.add(screenMesh);

            const ambientLine = new THREE.Mesh(new THREE.BoxGeometry(1.35, 0.008, 0.008), ambientLightMat);
            ambientLine.position.set(0, 0.44, 1.24); interiorTubGroup.add(ambientLine);

            const steeringColumn = new THREE.Group();
            steeringColumn.position.set(0.38, 0.62, 1.08); steeringColumn.rotation.x = -0.38;
            steeringWheelMesh = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.018, 16, 64), mechanicalBlackMat);
            steeringColumn.add(steeringWheelMesh); interiorTubGroup.add(steeringColumn);

            // Sliding Center Console Transmission Gear Lever
            gearShifterMesh = buildHingeNode('gear_rod', new THREE.BoxGeometry(0.04, 0.15, 0.04), new THREE.Vector3(0,0,0), chromeDetailsMaterial);
            gearShifterMesh.position.set(0, 0.42, 0.75);
            interiorTubGroup.add(gearShifterMesh);

            // Rear Console AC Ventilation Box
            const rearAcConsole = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.28, 0.15), mattePlasticsMat);
            rearAcConsole.position.set(0, 0.28, -0.42);
            interiorTubGroup.add(rearAcConsole);

            carGroup.add(interiorTubGroup);

            // I. R16 Multi-Spoke Alloys
            const tireGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.24, 32); tireGeo.rotateZ(Math.PI / 2);
            const axleCoordinates = [[-0.85, 0.32, 1.3], [0.85, 0.32, 1.3], [-0.85, 0.32, -1.3], [0.85, 0.32, -1.3]];
            
            axleCoordinates.forEach((pos, index) => {
                const hub = new THREE.Group(); hub.position.set(pos[0], pos[1], pos[2]);
                const tire = new THREE.Mesh(tireGeo, darkAlloyMaterial);
                tire.castShadow = true; hub.add(tire);
                
                const splitSpokeFace = new THREE.Mesh(new THREE.BoxGeometry(0.015, 0.52, 0.52), brightAlloyMaterial);
                tire.add(splitSpokeFace);

                wheelMeshes.push(tire);
                if (index < 2) frontWheels.push(hub);
                carGroup.add(hub);
            });

            scene.add(carGroup);
            hideLoadingScreen();
        }

        // --- 7. Interactive Canvas Click Raycaster Execution ---
        function onSceneElementClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let nodeMesh = intersects[0].object;
                let stateKey = null;

                nodeMesh.traverseAncestors(ancestor => {
                    for (const key in carStates) {
                        if (ancestor.name.toLowerCase().includes(key) || nodeMesh.name.toLowerCase().includes(key)) {
                            stateKey = key;
                        }
                    }
                });

                if (!stateKey) {
                    for (const key in carStates) {
                        if (nodeMesh.name.includes(key)) stateKey = key;
                    }
                }

                if (stateKey && typeof carStates[stateKey] === 'object') {
                    const data = carStates[stateKey];
                    data.open = !data.open;
                    data.target = data.open ? data.max : 0;
                    
                    if (stateKey === 'door_fl') floorPuddleLight.intensity = data.open ? 6.5 : 0.0;
                    if (stateKey === 'glove_box') gloveboxInteriorLight.intensity = data.open ? 2.5 : 0.0;
                }
            }
        }

        // --- 8. Real-time Showroom Kinematics Processing Loop (CarDekho Tracking Maps) ---
        function animate() {
            controls.update();

            const time = performance.now();

            // 1. Adaptive CarDekho Viewport State Tracking Computation
            const camDistance = camera.position.distanceTo(controls.target);
            if (camDistance < 1.35) {
                hudEl.textContent = "Interior 360° View";
                hudEl.style.color = "#ffaa00";
                hudEl.style.borderColor = "rgba(255,170,0,0.4)";
                hudEl.style.background = "rgba(255,170,0,0.1)";
            } else {
                hudEl.textContent = "Exterior 360° View";
                hudEl.style.color = "#00ffcc";
                hudEl.style.borderColor = "rgba(0,255,204,0.3)";
                hudEl.style.background = "rgba(0,255,204,0.15)";
            }

            // 2. Linearly Interpolate Panel Translations & Vector Hinge Radians
            for (const key in carStates) {
                const data = carStates[key];
                const nodeGroup = interactiveParts[key];

                if (nodeGroup && data.type) {
                    data.current += (data.target - data.current) * data.speed;
                    
                    if (data.type === 'rotateY') nodeGroup.rotation.y = data.current;
                    if (data.type === 'rotateX') nodeGroup.rotation.x = data.current;
                    if (data.type === 'translateY') nodeGroup.position.y = data.current;
                    if (data.type === 'translateZ') nodeGroup.position.z = data.current;
                }
            }

            // 3. Driver-Side Master Power Window Switch Tracking Logic
            const drwSwitch = interactiveParts['driver_switch_fl'];
            if (drwSwitch && carStates['window_fl']) {
                const winProgress = Math.abs(carStates['window_fl'].current) / 0.45;
                drwSwitch.rotation.x = winProgress > 0.02 && winProgress < 0.98 ? -0.15 : 0;
            }

            // Synchronize Aerodynamic Roof Deflector with Panoramic Sunroof slides
            if (deflectorMesh && carStates['sunroof']) {
                const rOpenProgress = Math.abs(carStates['sunroof'].current) / 0.6;
                deflectorMesh.position.y = 1.41 + (Math.min(rOpenProgress, 1.0) * 0.04);
            }

            // Continuous Wiper Oscillating Harmonic Loops
            if (carStates.wipersActive) {
                const sweepAngle = Math.sin(time * 0.007) * 0.72 + 0.72;
                wiperMeshes.forEach(wiper => { wiper.rotation.y = sweepAngle; });
            } else {
                wiperMeshes.forEach(wiper => { wiper.rotation.y += (0 - wiper.rotation.y) * 0.1; });
            }

            // 4. Simulated Electrical Sub-System Pipelines
            if (carStates.ignitionOn) {
                screenDisplayMat.color.setHex(0x0088ff);
                ambientLightMat.color.setHex(0x00ffcc);
                ambientLightMat.emissive.setHex(0x00ffcc);
                ambientLightMat.emissiveIntensity = 2.0;
                
                // Steering Column Sweep Synchronizations linked directly to Front Tire Hub structures
                const steeringSweep = Math.sin(time * 0.002) * 0.4;
                if (steeringWheelMesh) steeringWheelMesh.rotation.z = steeringSweep * 2.5;
                frontWheels.forEach(hub => { hub.rotation.y = steeringSweep; });

                // Intelligent Cornering Spotlight Computations
                fogLightLensMat.color.setHex(0xffffff);
                fogLightLensMat.emissive.setHex(0xfffaed);
                fogLightLeftSpot.intensity = steeringSweep > 0.04 ? 7.0 + (steeringSweep * 4) : 4.0;
                fogLightRightSpot.intensity = steeringSweep < -0.04 ? 7.0 + (Math.abs(steeringSweep) * 4) : 4.0;

                // Connecting Rear Lightbar Pulse Generation
                connectingDRLMat.color.setHex(0xff0000);
                connectingDRLMat.emissive.setHex(0xee0000);
                connectingDRLMat.emissiveIntensity = (Math.sin(time * 0.006) * 0.25) + 0.75;
            } else {
                screenDisplayMat.color.setHex(0x101010);
                ambientLightMat.color.setHex(0x000000);
                ambientLightMat.emissive.setHex(0x000000);
                fogLightLensMat.color.setHex(0x202020);
                fogLightLensMat.emissive.setHex(0x000000);
                connectingDRLMat.color.setHex(0x220000);
                connectingDRLMat.emissive.setHex(0x000000);

                fogLightLeftSpot.intensity = 0; fogLightRightSpot.intensity = 0;

                if (steeringWheelMesh) steeringWheelMesh.rotation.z += (0 - steeringWheelMesh.rotation.z) * 0.1;
                frontWheels.forEach(hub => { hub.rotation.y += (0 - hub.rotation.y) * 0.1; });
            }

            // Spoke reflection profile rotation velocities
            const wheelSpinVelocity = - time / 1100;
            wheelMeshes.forEach(mesh => { mesh.rotation.x = wheelSpinVelocity * Math.PI; });

            renderer.render(scene, camera);
        }

        // --- 9. Control Panel Infrastructure Click Listeners ---
        function setupInterfaceEvents() {
            document.getElementById('paint-picker').addEventListener('input', function() {
                bodyPaintMaterial.color.set(this.value);
            });

            document.getElementById('glass-picker').addEventListener('input', function() {
                windowGlassMaterial.color.set(this.value);
            });

            document.getElementById('ignition-btn').addEventListener('click', function() {
                carStates.ignitionOn = !carStates.ignitionOn;
                this.style.background = carStates.ignitionOn ? '#00ffcc' : '#1a1a1a';
                this.style.color = carStates.ignitionOn ? '#000' : '#eee';
                
                // Shift gear rod automatic mechanical validation pass from Park down to Drive
                carStates.gear_rod.open = carStates.ignitionOn;
                carStates.gear_rod.target = carStates.ignitionOn ? carStates.gear_rod.max : 0;
            });

            document.getElementById('wiper-btn').addEventListener('click', function() {
                carStates.wipersActive = !carStates.wipersActive;
                this.style.background = carStates.wipersActive ? '#00ffcc' : '#1a1a1a';
                this.style.color = carStates.wipersActive ? '#000' : '#eee';
            });

            document.getElementById('reset-btn').addEventListener('click', function() {
                for (const key in carStates) {
                    if (typeof carStates[key] === 'object') {
                        carStates[key].open = false;
                        carStates[key].target = 0;
                    }
                }
                carStates.wipersActive = false;
                carStates.ignitionOn = false;
                floorPuddleLight.intensity = 0;
                gloveboxInteriorLight.intensity = 0;
                
                document.getElementById('wiper-btn').style.background = '#1a1a1a';
                document.getElementById('wiper-btn').style.color = '#eee';
                document.getElementById('ignition-btn').style.background = '#1a1a1a';
                document.getElementById('ignition-btn').style.color = '#eee';
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function hideLoadingScreen() {
            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.remove(), 500);
        }
        
        window.addEventListener('resize', onWindowResize);
    </script>
</body>
</html>
